<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TairosaHub — Trading</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0c;--bg1:#111115;--bg2:#18181f;--bg3:#22222c;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --gold:#c9a84c;--gold2:#e8c97a;--gold-dim:rgba(201,168,76,0.13);
  --green:#3ecf8e;--green-dim:rgba(62,207,142,0.13);
  --red:#f06b6b;--red-dim:rgba(240,107,107,0.13);
  --blue:#5b8dee;--blue-dim:rgba(91,141,238,0.13);
  --purple:#a78bfa;--purple-dim:rgba(167,139,250,0.13);
  --text:#f0ede8;--text2:#8a8798;--text3:#4a4860;
  --r:12px;--rs:8px;
  --mono:'Space Mono',monospace;--sans:'Space Grotesk',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;-webkit-font-smoothing:antialiased;}
.hdr{position:sticky;top:0;z-index:100;background:rgba(10,10,12,0.95);backdrop-filter:blur(20px);border-bottom:0.5px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:54px;}
.logo{font-family:var(--mono);font-size:13px;color:var(--gold);letter-spacing:0.08em;}
.logo span{color:var(--text3);}
.hdr-cap{font-family:var(--mono);font-size:14px;font-weight:700;}
.main{padding:16px 16px 90px;max-width:480px;margin:0 auto;}
.sec{display:none;}.sec.active{display:block;}

.hero{background:var(--bg1);border:0.5px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:10px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),transparent);}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.hero-badge{font-family:var(--mono);font-size:10px;color:var(--gold);background:var(--gold-dim);border:0.5px solid rgba(201,168,76,0.3);border-radius:4px;padding:3px 8px;letter-spacing:0.06em;}
.hero-right{text-align:right;}
.hero-cap-lbl{font-size:10px;color:var(--text3);margin-bottom:2px;}
.hero-cap{font-family:var(--mono);font-size:22px;font-weight:700;}
.prog-track{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-bottom:7px;}
.prog-fill{height:100%;background:var(--gold);border-radius:2px;transition:width 0.5s;}
.prog-row{display:flex;justify-content:space-between;font-size:11px;}
.prog-pct{color:var(--gold);font-family:var(--mono);font-weight:700;}
.prog-nxt{color:var(--text2);}
.eta{font-size:11px;color:var(--text3);margin-top:8px;padding-left:10px;border-left:1.5px solid var(--gold);}

.obj-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.obj{background:var(--bg1);border:0.5px solid var(--border);border-radius:var(--rs);padding:12px 11px;position:relative;overflow:hidden;}
.obj.done{border-color:rgba(62,207,142,0.3);}
.obj-ico{font-size:14px;margin-bottom:6px;}
.obj-name{font-size:10px;color:var(--text2);line-height:1.3;margin-bottom:8px;min-height:38px;}
.obj-track{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-bottom:5px;}
.obj-fill{height:100%;border-radius:2px;transition:width 0.5s;}
.obj-pct{font-family:var(--mono);font-size:11px;font-weight:700;}

.rbox{background:rgba(201,168,76,0.05);border:0.5px solid rgba(201,168,76,0.2);border-radius:var(--r);padding:14px 18px;margin-bottom:10px;}
.rbox-hdr{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:10px;}
.rgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.ri{text-align:center;}
.ri-lbl{font-size:10px;color:var(--text3);margin-bottom:3px;}
.ri-val{font-family:var(--mono);font-size:15px;font-weight:700;}

.alert{border-radius:var(--rs);padding:10px 14px;margin-bottom:10px;font-size:12px;line-height:1.4;}
.alert.warn{background:rgba(201,168,76,0.1);border:0.5px solid rgba(201,168,76,0.25);color:var(--gold2);}
.alert.ok{background:rgba(62,207,142,0.1);border:0.5px solid rgba(62,207,142,0.25);color:#7de8be;}

.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.sc{background:var(--bg1);border:0.5px solid var(--border);border-radius:var(--rs);padding:12px 14px;}
.sc-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px;}
.sc-val{font-family:var(--mono);font-size:20px;font-weight:700;}
.sc-val.g{color:var(--green);}.sc-val.r{color:var(--red);}.sc-val.au{color:var(--gold);}
.sdots{display:flex;gap:4px;flex-wrap:wrap;padding:6px 0;}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

.wd-hero{background:var(--purple-dim);border:0.5px solid rgba(167,139,250,0.3);border-radius:var(--r);padding:18px;margin-bottom:10px;position:relative;overflow:hidden;}
.wd-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--purple),transparent);}
.wd-status{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--purple);font-weight:500;margin-bottom:8px;}
.wd-title{font-size:16px;font-weight:600;margin-bottom:6px;}
.wd-amount{font-family:var(--mono);font-size:32px;font-weight:700;color:var(--purple);margin:8px 0;}
.wd-desc{font-size:13px;color:var(--text2);line-height:1.5;}
.wd-next{background:var(--bg1);border:0.5px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:10px;}
.wd-next-hdr{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin-bottom:12px;}
.wd-milestone{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--border);}
.wd-milestone:last-child{border-bottom:none;}
.wd-ms-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:var(--mono);font-weight:700;flex-shrink:0;}
.wd-ms-dot.done{background:var(--green-dim);color:var(--green);}
.wd-ms-dot.next{background:var(--purple-dim);color:var(--purple);}
.wd-ms-dot.future{background:var(--bg3);color:var(--text3);}
.wd-ms-info{flex:1;}
.wd-ms-name{font-size:13px;font-weight:500;}
.wd-ms-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.wd-ms-amount{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--purple);}

.summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.sm{background:var(--bg1);border:0.5px solid var(--border);border-radius:var(--rs);padding:12px 10px;text-align:center;}
.sm-lbl{font-size:9px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);margin-bottom:4px;}
.sm-val{font-family:var(--mono);font-size:15px;font-weight:700;}

.steps-list{display:flex;flex-direction:column;gap:6px;}
.step-item{display:flex;align-items:center;gap:10px;background:var(--bg1);border:0.5px solid var(--border);border-radius:var(--rs);padding:11px 14px;}
.step-item.current{border-color:rgba(201,168,76,0.35);}
.step-item.done{opacity:0.5;}
.step-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-family:var(--mono);font-weight:700;flex-shrink:0;}
.step-num.d{background:var(--green-dim);color:var(--green);}
.step-num.c{background:var(--gold-dim);color:var(--gold);}
.step-num.f{background:var(--bg3);color:var(--text3);}
.step-info{flex:1;}
.step-name{font-size:13px;font-weight:500;}
.step-sub{font-size:11px;color:var(--text3);margin-top:1px;font-family:var(--mono);}
.step-cap{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text2);}
.step-tag{font-size:8px;font-family:var(--mono);padding:2px 5px;border-radius:3px;background:var(--purple-dim);color:var(--purple);margin-left:4px;}

.hi{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--border);}
.hbadge{width:34px;height:34px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:var(--mono);flex-shrink:0;}
.hbadge.win{background:var(--green-dim);color:var(--green);}
.hbadge.loss{background:var(--red-dim);color:var(--red);}
.hinfo{flex:1;min-width:0;}
.hdate{font-size:11px;color:var(--text3);}
.hdetail{font-size:12px;color:var(--text2);margin-top:1px;}
.hval{font-family:var(--mono);font-size:13px;font-weight:700;flex-shrink:0;}
.hnote-btn{font-size:10px;color:var(--text3);background:none;border:none;cursor:pointer;padding:2px 0;font-family:var(--sans);text-decoration:underline;margin-top:2px;}

.chart-card{background:var(--bg1);border:0.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;}
.chart-title{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin-bottom:14px;}
svg{display:block;width:100%;overflow:visible;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.bar-label{font-size:12px;width:64px;flex-shrink:0;font-family:var(--mono);}
.bar-track{flex:1;height:18px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width 0.5s;}
.bar-val{font-family:var(--mono);font-size:11px;width:70px;text-align:right;flex-shrink:0;}

.fsec{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin:18px 0 9px;display:flex;align-items:center;gap:8px;}
.fsec:first-child{margin-top:0;}
.fsec::after{content:'';flex:1;height:0.5px;background:var(--border);}
.fcard{background:var(--bg1);border:0.5px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:10px;}
label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:6px;margin-top:13px;}
label:first-child{margin-top:0;}
input,textarea{width:100%;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--rs);color:var(--text);font-family:var(--sans);font-size:14px;padding:10px 12px;outline:none;-webkit-appearance:none;appearance:none;transition:border-color 0.15s;}
textarea{resize:vertical;min-height:60px;}
input:focus,textarea:focus{border-color:var(--gold);}
.btn{display:block;width:100%;padding:12px;border-radius:var(--rs);font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;-webkit-appearance:none;appearance:none;border:none;margin-top:14px;transition:opacity 0.15s,transform 0.1s;}
.btn:active{opacity:0.78;transform:scale(0.98);}
.btn-gold{background:var(--gold);color:#0a0a0c;}
.btn-out{background:transparent;border:0.5px solid var(--border2)!important;color:var(--text2);margin-top:8px;}

.drop{border:1.5px dashed var(--border2);border-radius:var(--r);padding:32px 20px;text-align:center;cursor:pointer;transition:all 0.15s;background:var(--bg1);}
.drop:active,.drop.over{border-color:var(--gold);background:var(--gold-dim);}
.drop-ico{font-size:32px;margin-bottom:10px;}
.drop-main{font-size:14px;font-weight:500;margin-bottom:4px;}
.drop-sub{font-size:12px;color:var(--text3);line-height:1.5;}

.filter-row{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.fchip{padding:6px 12px;border-radius:100px;border:0.5px solid var(--border);background:var(--bg1);font-size:11px;color:var(--text2);cursor:pointer;white-space:nowrap;-webkit-appearance:none;appearance:none;font-family:var(--sans);transition:all 0.15s;}
.fchip.active{border-color:var(--gold);color:var(--gold);background:var(--gold-dim);}

.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:var(--bg);padding:9px 18px;border-radius:100px;font-size:13px;font-weight:500;opacity:0;transition:all 0.22s;pointer-events:none;z-index:999;white-space:nowrap;max-width:90%;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,12,0.97);backdrop-filter:blur(20px);border-top:0.5px solid var(--border);display:flex;padding:6px 0 max(env(safe-area-inset-bottom),6px);}
.bb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 0;background:none;border:none;color:var(--text3);font-size:8px;font-family:var(--sans);font-weight:500;text-transform:uppercase;letter-spacing:0.04em;cursor:pointer;-webkit-appearance:none;appearance:none;transition:color 0.15s;}
.bb:active{color:var(--text2);}
.bb.active{color:var(--gold);}
.bb-ico{font-size:17px;line-height:1;}
.empty{text-align:center;padding:36px 16px;color:var(--text3);font-size:13px;line-height:1.6;}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">Tairosa<span>Hub</span></div>
  <div class="hdr-cap" id="hdr-cap">€50.00</div>
</div>

<div class="main">
  <div id="sec-dash" class="sec active"><div id="dash-body"></div></div>
  <div id="sec-import" class="sec"><div id="import-body"></div></div>
  <div id="sec-withdraw" class="sec"><div id="withdraw-body"></div></div>
  <div id="sec-stats" class="sec"><div id="stats-body"></div></div>
  <div id="sec-journal" class="sec"><div id="journal-body"></div></div>
  <div id="sec-goals" class="sec"><div id="goals-body"></div></div>
  <div id="sec-steps" class="sec">
    <div style="font-size:12px;color:var(--text2);margin-bottom:14px">14 étapes · 40% WR · RR 3 · Risque 5%</div>
    <div class="steps-list" id="steps-list"></div>
  </div>
</div>

<div class="bnav">
  <button class="bb active" onclick="goTab('dash')" id="bnav-dash"><span class="bb-ico">◈</span>Vue</button>
  <button class="bb" onclick="goTab('import')" id="bnav-import"><span class="bb-ico">↧</span>Import</button>
  <button class="bb" onclick="goTab('withdraw')" id="bnav-withdraw"><span class="bb-ico">◆</span>Retrait</button>
  <button class="bb" onclick="goTab('stats')" id="bnav-stats"><span class="bb-ico">◔</span>Stats</button>
  <button class="bb" onclick="goTab('journal')" id="bnav-journal"><span class="bb-ico">≡</span>Journal</button>
  <button class="bb" onclick="goTab('goals')" id="bnav-goals"><span class="bb-ico">★</span>Objectifs</button>
  <button class="bb" onclick="goTab('steps')" id="bnav-steps"><span class="bb-ico">◎</span>Étapes</button>
</div>

<input type="file" id="csv-input" accept=".csv" style="display:none">
<input type="file" id="backup-input" accept=".json" style="display:none">
<div class="toast" id="toast"></div>

/* ═══ CALCUL CAPITAL ═══ */
function computeCapital(s){
  let cap=0;
  (s.deposits||[]).forEach(d=>cap+=d.amount);
  (s.trades||[]).forEach(t=>cap+=t.pnl);
  (s.withdrawals||[]).forEach(w=>cap-=w.amount);
  return +cap.toFixed(2);
}

/* Parse CSV Blueberry */
function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length)return[];
  // Detect separator
  const sep=lines[0].includes(';')&&!lines[0].includes(',')?';':',';
  const parseLine=l=>{const out=[];let cur='',q=false;for(let i=0;i<l.length;i++){const c=l[i];if(c==='"'){q=!q;}else if(c===sep&&!q){out.push(cur);cur='';}else cur+=c;}out.push(cur);return out.map(x=>x.trim().replace(/^"|"$/g,''));};
  const headers=parseLine(lines[0]);
  const idx=name=>headers.findIndex(h=>h.toLowerCase().includes(name.toLowerCase()));
  const iSym=idx('symbole'),iPnlNet=idx('net closed'),iPnl=idx('closed p'),iDate=idx('heure'),iPos=idx('position id'),iSide=idx('côté');
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const c=parseLine(lines[i]);
    if(c.length<headers.length-2)continue;
    let pnlRaw=(iPnlNet>=0?c[iPnlNet]:'')||(iPnl>=0?c[iPnl]:'');
    pnlRaw=(pnlRaw||'').replace(',','.').trim();
    if(!pnlRaw)continue;
    const pnl=parseFloat(pnlRaw);
    if(isNaN(pnl))continue;
    const dateStr=iDate>=0?c[iDate]:'';
    const d=new Date(dateStr.replace(' ','T')+'Z');
    if(isNaN(d.getTime()))continue;
    if(d<new Date('2026-06-15T00:00:00Z'))continue;
    const sym=(iSym>=0?c[iSym]:'').replace('.I','');
    const pos=iPos>=0?c[iPos]:'';
    const id=pos?('p:'+pos):(sym+':'+d.getTime());
    rows.push({id,result:pnl>=0?'win':'loss',pnl:+pnl.toFixed(2),pair:sym,note:'',date:d.getTime(),hUTC:d.getUTCHours()});
  }
  return rows;
}

function handleCSV(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const parsed=parseCSV(e.target.result);
      if(!parsed.length){toast('Aucun trade trouvé dans le fichier');return;}
      const s=getState();
      const existing=new Set((s.trades||[]).map(t=>t.id));
      let added=0;
      parsed.forEach(t=>{if(!existing.has(t.id)){s.trades.push(t);existing.add(t.id);added++;}});
      s.trades.sort((a,b)=>a.date-b.date);
      saveState(s);
      toast(added>0?`✓ ${added} nouveaux trades importés`:'Aucun nouveau trade (déjà à jour)');
      render();
    }catch(err){toast('Erreur de lecture du fichier');}
  };
  reader.readAsText(file);
}

function setupDropZone(){
  const dz=document.getElementById('drop-zone');
  if(!dz)return;
  ['dragover','dragenter'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.add('over');}));
  ['dragleave','drop'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.remove('over');}));
  dz.addEventListener('drop',e=>{const f=e.dataTransfer.files[0];if(f)handleCSV(f);});
}

/* ═══ STATS ═══ */
function renderStats(){
  const s=getState(),trades=s.trades||[];
  if(!trades.length){document.getElementById('stats-body').innerHTML='<div class="empty">Aucune donnée.</div>';return;}
  const wins=trades.filter(t=>t.result==='win'),losses=trades.filter(t=>t.result==='loss');
  const wr=(wins.length/trades.length)*100;
  const avgWin=wins.length?wins.reduce((a,t)=>a+Math.abs(t.pnl),0)/wins.length:0;
  const avgLoss=losses.length?losses.reduce((a,t)=>a+Math.abs(t.pnl),0)/losses.length:0;
  const expectancy=((wr/100)*avgWin)-((1-wr/100)*avgLoss);
  let equity=CFG.startCap;const points=[{x:0,y:equity}];
  trades.forEach((t,i)=>{equity+=t.pnl;points.push({x:i+1,y:equity});});
  const W=440,H=160,pad=8;
  const ys=points.map(p=>p.y);const minY=Math.min(...ys),maxY=Math.max(...ys),rangeY=maxY-minY||1;
  const maxX=Math.max(...points.map(p=>p.x))||1;
  const sx=x=>pad+(x/maxX)*(W-2*pad),sy=y=>H-pad-((y-minY)/rangeY)*(H-2*pad);
  const path=points.map((p,i)=>(i===0?'M':'L')+sx(p.x).toFixed(1)+' '+sy(p.y).toFixed(1)).join(' ');
  const areaPath=path+` L ${sx(maxX).toFixed(1)} ${H-pad} L ${pad} ${H-pad} Z`;
  const lastUp=points[points.length-1].y>=CFG.startCap,lineColor=lastUp?'var(--green)':'var(--red)';
  const pairMap={};
  trades.forEach(t=>{const p=t.pair||'Autre';if(!pairMap[p])pairMap[p]={w:0,l:0,pnl:0};if(t.result==='win')pairMap[p].w++;else pairMap[p].l++;pairMap[p].pnl+=t.pnl;});
  const pairRows=Object.entries(pairMap).sort((a,b)=>b[1].pnl-a[1].pnl).map(([pair,d])=>{const tot=d.w+d.l,pwr=tot?(d.w/tot*100):0;return`<div class="bar-row"><div class="bar-label">${pair}</div><div class="bar-track"><div class="bar-fill" style="width:${pwr}%;background:${pwr>=50?'var(--green)':'var(--red)'}"></div></div><div class="bar-val" style="color:${d.pnl>=0?'var(--green)':'var(--red)'}">${d.pnl>=0?'+':''}${d.pnl.toFixed(0)}€</div></div>`;}).join('');
  const hourMap={};
  trades.forEach(t=>{const hUTC=t.hUTC!==undefined?t.hUTC:new Date(t.date).getUTCHours();const hParis=(hUTC+2)%24;const slot=Math.floor(hParis/4)*4;const key=`${String(slot).padStart(2,'0')}-${String((slot+4)%24).padStart(2,'0')}h`;if(!hourMap[key])hourMap[key]={w:0,l:0,order:slot};if(t.result==='win')hourMap[key].w++;else hourMap[key].l++;});
  const hourRows=Object.entries(hourMap).sort((a,b)=>a[1].order-b[1].order).map(([slot,d])=>{const tot=d.w+d.l,hwr=tot?(d.w/tot*100):0;return`<div class="bar-row"><div class="bar-label" style="font-size:10px">${slot}</div><div class="bar-track"><div class="bar-fill" style="width:${hwr}%;background:${hwr>=50?'var(--green)':'var(--red)'}"></div></div><div class="bar-val">${hwr.toFixed(0)}% · ${tot}t</div></div>`;}).join('');
  document.getElementById('stats-body').innerHTML=`
  <div class="chart-card"><div class="chart-title">Equity curve · ${fmt(equity)}</div>
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="height:160px">
      <defs><linearGradient id="eq" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${lastUp?'rgba(62,207,142,0.25)':'rgba(240,107,107,0.25)'}"/><stop offset="100%" stop-color="rgba(0,0,0,0)"/></linearGradient></defs>
      <line x1="${pad}" y1="${sy(CFG.startCap).toFixed(1)}" x2="${W-pad}" y2="${sy(CFG.startCap).toFixed(1)}" stroke="var(--border2)" stroke-width="0.5" stroke-dasharray="3 3"/>
      <path d="${areaPath}" fill="url(#eq)"/><path d="${path}" fill="none" stroke="${lineColor}" stroke-width="2" stroke-linejoin="round"/>
    </svg></div>
  <div class="sgrid">
    <div class="sc"><div class="sc-lbl">Espérance / trade</div><div class="sc-val ${expectancy>=0?'g':'r'}">${expectancy>=0?'+':''}${expectancy.toFixed(2)}€</div></div>
    <div class="sc"><div class="sc-lbl">Win Rate</div><div class="sc-val au">${wr.toFixed(1)}%</div></div>
    <div class="sc"><div class="sc-lbl">Gain moyen</div><div class="sc-val g">+${avgWin.toFixed(2)}€</div></div>
    <div class="sc"><div class="sc-lbl">Perte moyenne</div><div class="sc-val r">-${avgLoss.toFixed(2)}€</div></div>
  </div>
  <div class="chart-card"><div class="chart-title">Performance par paire</div>${pairRows}</div>
  <div class="chart-card"><div class="chart-title">Win Rate par heure (Paris)</div>${hourRows}</div>`;
}

/* ═══ JOURNAL ═══ */
let journalFilter='all';
function setFilter(f){journalFilter=f;renderJournal();}
function editNote(id){const s=getState();const t=s.trades.find(x=>x.id===id);if(!t)return;const note=prompt('Note pour ce trade :',t.note||'');if(note===null)return;t.note=note.trim();saveState(s);toast('Note enregistrée');renderJournal();}
function renderJournal(){
  const s=getState();let trades=s.trades||[];
  const el=document.getElementById('journal-body');
  if(!trades.length){el.innerHTML='<div class="empty">Aucun trade. Importe ton CSV dans l\'onglet Import.</div>';return;}
  const pairs=['all','win','loss',...new Set(trades.map(t=>t.pair||'Autre'))];
  const chips=pairs.map(p=>{const lbl=p==='all'?'Tous':p==='win'?'Wins':p==='loss'?'Loss':p;return`<button class="fchip ${journalFilter===p?'active':''}" onclick="setFilter('${p}')">${lbl}</button>`;}).join('');
  let filtered=[...trades];
  if(journalFilter==='win')filtered=trades.filter(t=>t.result==='win');
  else if(journalFilter==='loss')filtered=trades.filter(t=>t.result==='loss');
  else if(journalFilter!=='all')filtered=trades.filter(t=>(t.pair||'Autre')===journalFilter);
  const rows=filtered.slice().reverse().map(t=>{
    const gi=trades.indexOf(t)+1;
    const dt=new Date(t.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
    const isWin=t.result==='win';
    return`<div class="hi" style="align-items:flex-start"><div class="hbadge ${t.result}">${isWin?'WIN':'LOSS'}</div><div class="hinfo"><div class="hdate">#${gi} · ${dt} · ${t.pair||'—'}</div><div class="hdetail" style="white-space:normal">${t.note?t.note:'<span style="color:var(--text3)">Pas de note</span>'}</div><button class="hnote-btn" onclick="editNote('${t.id}')">✎ ${t.note?'Modifier':'Ajouter'} une note</button></div><div class="hval" style="color:${isWin?'var(--green)':'var(--red)'}">${t.pnl>=0?'+':''}${t.pnl.toFixed(2)}€</div></div>`;
  }).join('');
  el.innerHTML=`<div class="filter-row">${chips}</div>${rows}`;
}

/* ═══ STEPS ═══ */
function renderSteps(){
  const el=document.getElementById('steps-list');if(!el)return;
  const s=getState(),cap=computeCapital(s);
  el.innerHTML=STEPS.map((stp,i)=>{
    const isDone=cap>=(STEPS[i+1]||Infinity),isCur=curStep(cap)===i;
    const risk=stp*CFG.riskPct,gain=risk*CFG.rr;
    let tag='';
    if(i+1===CFG.obj1Step)tag='<span class="step-tag">100€/T</span>';
    if(i+1===CFG.obj2Step)tag='<span class="step-tag">1000€/T</span>';
    if(i+1===CFG.obj3Step)tag='<span class="step-tag">FINAL</span>';
    return`<div class="step-item ${isDone?'done':isCur?'current':''}"><div class="step-num ${isDone?'d':isCur?'c':'f'}">${isDone?'✓':i+1}</div><div class="step-info"><div class="step-name">Étape ${i+1}${tag}</div><div class="step-sub">€${risk.toFixed(2)} risque · €${gain.toFixed(2)} cible</div></div><div class="step-cap">€${stp.toLocaleString('fr-FR')}</div></div>`;
  }).join('');
}

/* ═══ ACTIONS ═══ */
function saveWd(){const amount=parseFloat(document.getElementById('in-wd')?.value);const note=document.getElementById('in-wd-note')?.value.trim()||'';if(isNaN(amount)||amount<=0){toast('Montant invalide');return;}const s=getState();if(!s.withdrawals)s.withdrawals=[];s.withdrawals.push({amount,note,date:Date.now()});saveState(s);toast('Retrait enregistré');render();}
function saveDep(){const amount=parseFloat(document.getElementById('in-dep')?.value);const note=document.getElementById('in-dep-note')?.value.trim()||'Dépôt';if(isNaN(amount)||amount<=0){toast('Montant invalide');return;}const s=getState();if(!s.deposits)s.deposits=[];s.deposits.push({amount,note,date:Date.now()});saveState(s);toast('Dépôt enregistré');render();}

/* ═══ MAIN ═══ */
function render(){
  const s=getState();
  document.getElementById('hdr-cap').textContent=fmt(computeCapital(s));
  if(document.getElementById('sec-dash').classList.contains('active'))renderDash();
  if(document.getElementById('sec-import').classList.contains('active'))renderImport();
  if(document.getElementById('sec-withdraw').classList.contains('active'))renderWithdraw();
  if(document.getElementById('sec-stats').classList.contains('active'))renderStats();
  if(document.getElementById('sec-journal').classList.contains('active'))renderJournal();
  if(document.getElementById('sec-goals').classList.contains('active'))renderGoals();
  if(document.getElementById('sec-steps').classList.contains('active'))renderSteps();
}

/* File inputs */
document.getElementById('csv-input').addEventListener('change',e=>{const f=e.target.files[0];if(f)handleCSV(f);e.target.value='';});
document.getElementById('backup-input').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=ev=>{try{const data=JSON.parse(ev.target.result);if(data.trades){saveState(data);toast('✓ Sauvegarde importée');render();}else toast('Fichier invalide');}catch{toast('Erreur de lecture');}};
  reader.readAsText(f);e.target.value='';
});

render();renderDash();
</script>
